name: Update Schema from Disease Metadata

# Runs on every branch whenever disease_metadata.csv changes.
# Regenerates the YAML schema, data dictionary, and documentation so that
# all schema-derived artifacts stay in sync with the disease catalog.
on:
  push:
    paths:
      - 'examples-and-templates/disease_metadata.csv'
      # Exclude auto-generated files to prevent workflow loops
      - '!examples-and-templates/data_reporting_schema.yaml'
      - '!examples-and-templates/disease_tracking_data_dictionary.csv'
      - '!guides/data-technical-specs.md'
    # No 'branches' filter — runs on every branch
  pull_request:
    paths:
      - 'examples-and-templates/disease_metadata.csv'
      # Exclude auto-generated files to prevent workflow loops
      - '!examples-and-templates/data_reporting_schema.yaml'
      - '!examples-and-templates/disease_tracking_data_dictionary.csv'
      - '!guides/data-technical-specs.md'

jobs:
  update-schema:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pydantic pyyaml

      - name: Update schema from disease metadata
        run: |
          python3 scripts/update_schema_from_disease_metadata.py

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated schema artifacts
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add examples-and-templates/data_reporting_schema.yaml
          git add examples-and-templates/disease_tracking_data_dictionary.csv
          git add guides/data-technical-specs.md
          git commit -m "Auto-update schema artifacts from disease_metadata.csv" \
            -m "Updated files: $(git diff --cached --name-only | tr '\n' ' ')"

          # Push to the correct branch (source branch for PRs, current branch for pushes)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          git push origin HEAD:"$BRANCH"
